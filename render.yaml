# Render Blueprint for MOTORIQ.
# Create → "Blueprint" in the Render dashboard and point it at this repo.
# It provisions a managed PostgreSQL database and the API web service.
# Fill the `sync: false` secrets in the dashboard after the first deploy.

databases:
  - name: motoriq-db
    databaseName: motoriq
    user: motoriq
    plan: free # bump to `starter`+ for production

services:
  - type: web
    name: motoriq-api
    runtime: node
    plan: free # bump for production
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    # Sync the schema before traffic hits the new build.
    preDeployCommand: npx prisma db push
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: motoriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong secret
      - key: CORS_ORIGINS
        value: "*" # tighten to your app/web origins in production

      # ── Fuel data ── (aggregate = real UK retailer feeds)
      - key: FUEL_FINDER_MODE
        value: aggregate
      - key: DEFAULT_TANK_LITRES
        value: "45"

      # ── Seeded admin account (change these) ──
      - key: ADMIN_EMAIL
        value: admin@motoriq.co.uk
      - key: ADMIN_PASSWORD
        sync: false

      # ── Card issuer (Wallester) — leave WALLESTER_MOCK=true until live ──
      - key: WALLESTER_MOCK
        value: "true"
      - key: WALLESTER_API_KEY
        sync: false
      - key: WALLESTER_PRIVATE_KEY
        sync: false
      - key: WALLESTER_PROGRAM_ID
        sync: false
      - key: WALLESTER_CARD_PRODUCT_ID
        sync: false
      - key: WALLESTER_AUDIENCE_ID
        sync: false

      # ── AI insights (Claude) — optional ──
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AI_INSIGHTS_MODEL
        value: claude-opus-4-8

      # ── Push notifications (FCM) — optional; mock until set ──
      - key: PUSH_PROVIDER
        value: mock
      - key: FCM_PROJECT_ID
        sync: false
      - key: FCM_CLIENT_EMAIL
        sync: false
      - key: FCM_PRIVATE_KEY
        sync: false
