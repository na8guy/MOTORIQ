# MOTORIQ — complete Render Blueprint.
#
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# This provisions a PostgreSQL database AND the API web service, wires
# DATABASE_URL, generates a secure JWT_SECRET, creates the schema, seeds an
# admin + demo account, and auto-populates every other variable with working
# dummy values (all third-party integrations run in mock mode). No manual env
# entry required — the platform boots ready to use.
#
# After deploy:
#   • API:   https://<service>.onrender.com/health
#   • Admin: https://<service>.onrender.com/admin   (admin@motoriq.co.uk / see ADMIN_PASSWORD)
#   • Demo:  demo@motoriq.co.uk / password123
#
# Free tier notes: free web services sleep after ~15 min idle (first request
# wakes them); free PostgreSQL is deleted ~30 days after creation — upgrade to
# a paid DB plan for anything real.

databases:
  - name: motoriq-db
    databaseName: motoriq
    user: motoriq
    plan: free

services:
  - type: web
    name: motoriq-api
    runtime: node
    plan: free
    rootDir: backend
    # Build only compiles (install incl. dev deps — Render sets
    # NODE_ENV=production which would otherwise skip typescript/prisma).
    buildCommand: >-
      npm install --include=dev &&
      npx prisma generate &&
      npm run build
    # Migrate + seed at START, when the linked database is guaranteed ready.
    # `prisma db push` is idempotent — it creates the schema if it doesn't
    # exist and is a no-op afterwards ("auto-migrate if it doesn't exist").
    startCommand: >-
      npx prisma db push &&
      (npm run seed || echo 'seed skipped') &&
      node dist/server.js
    healthCheckPath: /health
    envVars:
      # ── Core (required) ──
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: motoriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d

      # ── Admin/ops account (dummy — change ADMIN_PASSWORD) ──
      - key: ADMIN_EMAIL
        value: admin@motoriq.co.uk
      - key: ADMIN_PASSWORD
        value: ChangeMe_Admin_2026!

      # ── Fuel data (aggregate = real UK retailer feeds, NO auth needed) ──
      - key: FUEL_FINDER_MODE
        value: aggregate
      - key: FUEL_FINDER_BASE_URL
        value: https://api.fuel-finder.service.gov.uk
      # single-mode only (official gov.uk API): OAuth 2.0 client-credentials.
      - key: FUEL_FINDER_CLIENT_ID
        value: ""
      - key: FUEL_FINDER_CLIENT_SECRET
        value: ""
      - key: FUEL_FINDER_TOKEN_URL
        value: ""
      - key: FUEL_FINDER_SCOPE
        value: ""
      - key: FUEL_FINDER_AUTH_STYLE
        value: post
      - key: FUEL_FINDER_API_KEY
        value: ""
      # Leave EMPTY to use the built-in list of working retailer feeds.
      # (An empty value is handled correctly now — it previously produced an
      # empty feed list, so the API silently served mock London-only samples.)
      - key: FUEL_RETAILER_FEEDS
        value: ""
      - key: FUEL_FEED_TTL_SECONDS
        value: "900"
      - key: DEFAULT_TANK_LITRES
        value: "45"

      # ── DVLA / DVSA vehicle data (automatic MOT + road-tax reminders) ──
      # DVLA_MOCK=true returns believable sample data so reminders work before
      # you have credentials. Set it to false once real keys are in place.
      #
      #  MOT expiry  → DVSA MOT History API (OAuth + x-api-key)
      #                register: https://documentation.history.mot.api.gov.uk
      #  Tax due     → DVLA Vehicle Enquiry Service (x-api-key)
      #                register: https://developer-portal.driver-vehicle-licensing.api.gov.uk
      #                (VES registration was CLOSED as of 2026-07 — "system upgrades")
      #
      # Insurance renewal and service dates have NO public API (the Motor
      # Insurance Database is insurer/police-only) — members enter those.
      - key: DVLA_MOCK
        value: "true"
      - key: DVLA_VES_API_KEY
        value: ""
      - key: MOT_HISTORY_API_KEY
        value: ""
      - key: MOT_HISTORY_CLIENT_ID
        value: ""
      - key: MOT_HISTORY_CLIENT_SECRET
        value: ""
      - key: MOT_HISTORY_TOKEN_URL
        value: ""

      # ── EV charging (Open Charge Map) ──
      # WITHOUT THIS KEY the EV screen has no real data: it falls back to a
      # handful of London samples, so anywhere outside London shows nothing.
      # Free key: sign in at openchargemap.org → My Profile → My Apps →
      # Register An Application.
      # NOTE: OCM data is CC BY-SA 4.0 — attribution is shown in-app and is a
      # condition of the licence. Review the licence for commercial use.
      - key: OCM_API_KEY
        value: ""

      # ── Drive-time routing (OSRM) ──
      # The public demo server is free and keyless, but its usage policy
      # forbids heavy production traffic — self-host OSRM or use a paid router
      # before real volume, and point OSRM_BASE_URL at it.
      - key: ROUTING_ENABLED
        value: "true"
      - key: OSRM_BASE_URL
        value: https://router.project-osrm.org

      # ── Legal documents ──
      # Bump the version when terms materially change: members whose accepted
      # version is older must accept again (UK GDPR needs current consent).
      - key: TERMS_VERSION
        value: "2026-07-16"
      - key: PRIVACY_VERSION
        value: "2026-07-16"
      - key: TERMS_URL
        value: https://motoriq.co.uk/terms
      - key: PRIVACY_URL
        value: https://motoriq.co.uk/privacy

      # ── Wallester (virtual cards + wallet) — MOCK, dummy creds ──
      - key: WALLESTER_MOCK
        value: "true"
      - key: WALLESTER_BASE_URL
        value: https://api.wallester.com
      - key: WALLESTER_API_VERSION
        value: "6.0"
      - key: WALLESTER_AUDIENCE_ID
        value: dummy-audience-id
      - key: WALLESTER_API_KEY
        value: dummy-wallester-api-key
      - key: WALLESTER_PRIVATE_KEY
        value: ""
      - key: WALLESTER_PROGRAM_ID
        value: dummy-program-id
      - key: WALLESTER_CARD_PRODUCT_ID
        value: dummy-card-product-id
      - key: WALLESTER_DEFAULT_CURRENCY
        value: GBP

      # ── AI savings insights (Claude) — empty = rule-based fallback ──
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: AI_INSIGHTS_MODEL
        value: claude-opus-4-8

      # ── Push notifications (FCM) — MOCK, dummy creds ──
      - key: PUSH_PROVIDER
        value: mock
      - key: FCM_PROJECT_ID
        value: dummy-fcm-project
      - key: FCM_CLIENT_EMAIL
        value: dummy@motoriq.iam.gserviceaccount.com
      - key: FCM_PRIVATE_KEY
        value: ""

      # ── Email (Resend) + verification — empty key = emails logged (mock) ──
      - key: RESEND_API_KEY
        value: ""
      # Must be on a domain verified in Resend. Swap to the MOTORIQ domain once
      # you own and verify it.
      - key: EMAIL_FROM
        value: MOTORIQ <noreply@wanadryve.xyz>
      # Leave APP_PUBLIC_URL empty: the code falls back to Render's
      # RENDER_EXTERNAL_URL (the full https URL) automatically for the verify link.
      - key: APP_PUBLIC_URL
        value: ""
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
