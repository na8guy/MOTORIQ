# MOTORIQ — complete Render Blueprint.
#
# Deploy: Render Dashboard → New → Blueprint → pick this repo.
# This provisions a PostgreSQL database AND the API web service, wires
# DATABASE_URL, generates a secure JWT_SECRET, creates the schema, seeds an
# admin + demo account, and auto-populates every other variable with working
# dummy values (all third-party integrations run in mock mode). No manual env
# entry required — the platform boots ready to use.
#
# After deploy:
#   • API:   https://<service>.onrender.com/health
#   • Admin: https://<service>.onrender.com/admin   (admin@motoriq.co.uk / see ADMIN_PASSWORD)
#   • Demo:  demo@motoriq.co.uk / password123
#
# Free tier notes: free web services sleep after ~15 min idle (first request
# wakes them); free PostgreSQL is deleted ~30 days after creation — upgrade to
# a paid DB plan for anything real.

databases:
  - name: motoriq-db
    databaseName: motoriq
    user: motoriq
    plan: free

services:
  - type: web
    name: motoriq-api
    runtime: node
    plan: free
    rootDir: backend
    # Build: install (incl. dev deps — Render sets NODE_ENV=production which
    # would otherwise skip typescript/prisma), generate client, compile,
    # create the schema, and seed admin + demo data. Seed is best-effort.
    buildCommand: >-
      npm install --include=dev &&
      npx prisma generate &&
      npm run build &&
      npx prisma db push &&
      (npm run seed || echo 'seed skipped')
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # ── Core (required) ──
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: motoriq-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 30d

      # ── Admin/ops account (dummy — change ADMIN_PASSWORD) ──
      - key: ADMIN_EMAIL
        value: admin@motoriq.co.uk
      - key: ADMIN_PASSWORD
        value: ChangeMe_Admin_2026!

      # ── Fuel data (real UK retailer feeds; no key needed) ──
      - key: FUEL_FINDER_MODE
        value: aggregate
      - key: FUEL_FINDER_BASE_URL
        value: https://api.fuel-finder.service.gov.uk
      - key: FUEL_FINDER_API_KEY
        value: dummy-fuel-finder-key
      - key: FUEL_RETAILER_FEEDS
        value: ""
      - key: FUEL_FEED_TTL_SECONDS
        value: "900"
      - key: DEFAULT_TANK_LITRES
        value: "45"

      # ── Wallester (virtual cards + wallet) — MOCK, dummy creds ──
      - key: WALLESTER_MOCK
        value: "true"
      - key: WALLESTER_BASE_URL
        value: https://api.wallester.com
      - key: WALLESTER_API_VERSION
        value: "6.0"
      - key: WALLESTER_AUDIENCE_ID
        value: dummy-audience-id
      - key: WALLESTER_API_KEY
        value: dummy-wallester-api-key
      - key: WALLESTER_PRIVATE_KEY
        value: ""
      - key: WALLESTER_PROGRAM_ID
        value: dummy-program-id
      - key: WALLESTER_CARD_PRODUCT_ID
        value: dummy-card-product-id
      - key: WALLESTER_DEFAULT_CURRENCY
        value: GBP

      # ── AI savings insights (Claude) — empty = rule-based fallback ──
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: AI_INSIGHTS_MODEL
        value: claude-opus-4-8

      # ── Push notifications (FCM) — MOCK, dummy creds ──
      - key: PUSH_PROVIDER
        value: mock
      - key: FCM_PROJECT_ID
        value: dummy-fcm-project
      - key: FCM_CLIENT_EMAIL
        value: dummy@motoriq.iam.gserviceaccount.com
      - key: FCM_PRIVATE_KEY
        value: ""
