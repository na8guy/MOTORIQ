services:
  db:
    image: postgres:16-alpine
    container_name: motoriq-db
    environment:
      POSTGRES_USER: motoriq
      POSTGRES_PASSWORD: motoriq
      POSTGRES_DB: motoriq
    ports:
      - "5432:5432"
    volumes:
      - motoriq_pgdata:/var/lib/postgresql/data

volumes:
  motoriq_pgdata:
